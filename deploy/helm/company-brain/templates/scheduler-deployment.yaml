{{- if .Values.scheduler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: company-brain-scheduler
  labels:
    app.kubernetes.io/name: company-brain
    app.kubernetes.io/component: scheduler
spec:
  replicas: {{ .Values.scheduler.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: company-brain
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: company-brain
        app.kubernetes.io/component: scheduler
    spec:
      containers:
        - name: scheduler
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: {{ toJson .Values.scheduler.command }}
          envFrom:
            - secretRef:
                name: {{ default "company-brain-secrets" .Values.secrets.existingSecret }}
          env:
            - name: WORKER_ROLE
              value: scheduler
            - name: SCHEDULER_LEASE_ENDPOINT
              value: /api/v1/scheduler/lease
{{- end }}
