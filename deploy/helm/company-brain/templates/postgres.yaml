{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: company-brain-postgres
spec:
  serviceName: company-brain-postgres
  selector:
    matchLabels:
      app.kubernetes.io/name: company-brain-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: company-brain-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default "company-brain-secrets" .Values.secrets.existingSecret }}
                  key: {{ .Values.postgresql.passwordSecretKey }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgresql.storageSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: company-brain-postgres
spec:
  selector:
    app.kubernetes.io/name: company-brain-postgres
  ports:
    - port: 5432
{{- end }}
