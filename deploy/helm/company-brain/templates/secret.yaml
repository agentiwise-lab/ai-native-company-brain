{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: company-brain-secrets
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.values.DATABASE_URL | quote }}
  REDIS_URL: {{ .Values.secrets.values.REDIS_URL | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.values.POSTGRES_PASSWORD | quote }}
  COMPOSIO_API_KEY: {{ .Values.secrets.values.COMPOSIO_API_KEY | quote }}
  S3_ACCESS_KEY_ID: {{ .Values.secrets.values.S3_ACCESS_KEY_ID | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.secrets.values.S3_SECRET_ACCESS_KEY | quote }}
{{- end }}
