image:
  repository: ghcr.io/agentiwise-lab/ai-native-company-brain
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

app:
  port: 3000
  env:
    COMPANY_BRAIN_TENANT_ID: tenant_demo
    COMPANY_BRAIN_REPOSITORY: postgres

workers:
  enabled: true
  replicaCount: 2
  command: ["npm", "run", "start"]

scheduler:
  enabled: true
  replicaCount: 1
  command: ["npm", "run", "start"]

postgresql:
  enabled: true
  image: pgvector/pgvector:pg17
  database: company_brain
  username: brain
  passwordSecretKey: POSTGRES_PASSWORD
  storageSize: 20Gi

externalPostgres:
  enabled: false
  databaseUrlSecretKey: DATABASE_URL

redis:
  enabled: true
  image: redis:7-alpine
  storageSize: 8Gi

externalRedis:
  enabled: false
  redisUrlSecretKey: REDIS_URL

objectStorage:
  provider: minio
  endpoint: http://company-brain-minio:9000
  bucket: company-brain
  accessKeySecretKey: S3_ACCESS_KEY_ID
  secretKeySecretKey: S3_SECRET_ACCESS_KEY

secrets:
  existingSecret: ""
  values:
    DATABASE_URL: postgres://brain:brain@company-brain-postgres:5432/company_brain
    REDIS_URL: redis://company-brain-redis:6379
    POSTGRES_PASSWORD: brain
    COMPOSIO_API_KEY: ""
    S3_ACCESS_KEY_ID: minioadmin
    S3_SECRET_ACCESS_KEY: minioadmin
