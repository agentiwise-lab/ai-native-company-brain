    <rect y="74" width="220" height="54" rx="12" fill="#edf4ef"/><text x="18" y="109" class="nodeText">Extract atoms</text>
    <rect y="148" width="220" height="54" rx="12" fill="#fff2df" stroke="#a96d2f" stroke-width="2"/><text x="18" y="183" class="nodeText" style="font-size:19px">Candidate memories</text>
    <rect y="222" width="220" height="54" rx="12" fill="#fff2df" stroke="#a96d2f" stroke-width="2"/><text x="18" y="257" class="nodeText">Knowledge PRs</text>
    <rect y="296" width="220" height="54" rx="12" fill="#e5f4ec" stroke="#116b55" stroke-width="2"/><text x="18" y="331" class="nodeText">Reviewed merge</text>
  </g>

  <rect x="925" y="310" width="265" height="510" rx="18" class="panel"/>
  <text x="954" y="352" class="label">BRAIN TIERS</text>
  <line x1="1058" y1="400" x2="1058" y2="744" class="rail"/>
  <g transform="translate(952 390)">
    <rect width="210" height="48" rx="10" fill="#f2e7d9" stroke="#dfcbb2" stroke-width="2"/><text x="18" y="31" class="nodeText">Individual</text>
    <rect y="70" width="210" height="48" rx="10" fill="#eef2ee" stroke="#dce2dd" stroke-width="2"/><text x="18" y="101" class="nodeText">Team</text>
    <rect y="140" width="210" height="48" rx="10" fill="#dbe7df" stroke="#c2d6c8" stroke-width="2"/><text x="18" y="171" class="nodeText">Department</text>
    <rect y="210" width="210" height="48" rx="10" fill="#116b55"/><text x="18" y="241" class="white" style="font:700 21px Inter,Arial">Company main</text>
    <rect y="280" width="210" height="48" rx="10" fill="#15211c"/><text x="18" y="311" class="white" style="font:700 21px Inter,Arial">Exec protected</text>
  </g>
  <text x="954" y="772" class="small">Authority rises, velocity drops.</text>

  <rect x="1225" y="310" width="240" height="510" rx="18" class="panel"/>
  <text x="1252" y="352" class="label">REGISTRY</text>
  <g transform="translate(1254 390)">
    <rect width="170" height="50" rx="10" fill="#e8f0f6" stroke="#315f86" stroke-width="2"/><text x="16" y="32" class="nodeText">Tools</text>
    <rect y="68" width="170" height="50" rx="10" fill="#e8f0f6" stroke="#315f86" stroke-width="2"/><text x="16" y="100" class="nodeText">Skills</text>
    <rect y="136" width="170" height="50" rx="10" fill="#e8f0f6" stroke="#315f86" stroke-width="2"/><text x="16" y="168" class="nodeText">Plugins</text>
    <rect y="204" width="170" height="50" rx="10" fill="#fff2df" stroke="#a96d2f" stroke-width="2"/><text x="16" y="236" class="nodeText">Cron jobs</text>
    <rect y="272" width="170" height="50" rx="10" fill="#e5f4ec" stroke="#116b55" stroke-width="2"/><text x="16" y="304" class="nodeText">Policies</text>
  </g>
  <text x="1254" y="772" class="small">Reviewed + rollback-ready.</text>

  <rect x="1510" y="310" width="220" height="510" rx="18" class="dark"/>
  <text x="1545" y="352" class="label" fill="#1b8a68">AGENTS</text>
  <g transform="translate(1545 390)">
    <rect width="140" height="48" rx="10" fill="#edf4ef"/><text x="16" y="31" class="nodeText" style="font-size:18px">Codex</text>
    <rect y="70" width="140" height="48" rx="10" fill="#edf4ef"/><text x="16" y="101" class="nodeText" style="font-size:18px">Claude</text>
    <rect y="140" width="140" height="48" rx="10" fill="#edf4ef"/><text x="16" y="171" class="nodeText" style="font-size:18px">OpenCode</text>
    <rect y="210" width="140" height="48" rx="10" fill="#edf4ef"/><text x="16" y="241" class="nodeText" style="font-size:18px">MCP</text>
  </g>

  <path class="line" d="M300 565 C315 565 315 565 330 565"/>
  <path class="line" d="M560 565 C575 565 575 565 590 565"/>
  <path class="line" d="M890 565 C905 565 910 565 925 565"/>
  <path class="lineAmber" d="M1190 565 C1205 565 1210 565 1225 565"/>
  <path class="line" d="M1465 565 C1485 565 1490 565 1510 565"/>

  <rect x="70" y="875" width="1660" height="150" rx="18" class="panel"/>
  <text x="100" y="918" class="label">SELF-HOST FOUNDATION</text>
  <g transform="translate(100 948)">
    <rect width="175" height="50" rx="10" class="node"/><text x="18" y="32" class="nodeText">Postgres</text>
    <rect x="200" width="175" height="50" rx="10" class="node"/><text x="218" y="32" class="nodeText">pgvector</text>
    <rect x="400" width="205" height="50" rx="10" class="node"/><text x="418" y="32" class="nodeText">Object store</text>
    <rect x="630" width="205" height="50" rx="10" class="node"/><text x="648" y="32" class="nodeText">Event ledger</text>
    <rect x="860" width="150" height="50" rx="10" class="node"/><text x="878" y="32" class="nodeText">Queue</text>
    <rect x="1035" width="175" height="50" rx="10" class="node"/><text x="1053" y="32" class="nodeText">Scheduler</text>
    <rect x="1235" width="160" height="50" rx="10" class="node"/><text x="1253" y="32" class="nodeText">Audit log</text>
    <rect x="1420" width="170" height="50" rx="10" fill="#e5f4ec" stroke="#116b55" stroke-width="2"/><text x="1438" y="32" class="nodeText">MCP server</text>
  </g>
