<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120">
  <defs>
    <style>
      .bg{fill:#f6f7f4}
      .panel{fill:#ffffff;stroke:#dce2dd;stroke-width:2}
      .dark{fill:#15211c}
      .title{font:800 54px Inter,Arial,sans-serif;fill:#111713}
      .subtitle{font:500 23px Inter,Arial,sans-serif;fill:#5c665e}
      .label{font:800 22px Inter,Arial,sans-serif;fill:#116b55;letter-spacing:2px}
      .node{fill:#eef2ee;stroke:#dce2dd;stroke-width:2}
      .nodeText{font:700 22px Inter,Arial,sans-serif;fill:#111713}
      .small{font:500 18px Inter,Arial,sans-serif;fill:#5c665e}
      .green{fill:#116b55}
      .amber{fill:#a96d2f}
      .blue{fill:#315f86}
      .red{fill:#a2403a}
      .white{fill:#edf4ef}
      .line{stroke:#116b55;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .lineAmber{stroke:#a96d2f;stroke-width:4;fill:none;marker-end:url(#arrowAmber)}
      .rail{stroke:#dce2dd;stroke-width:2;stroke-dasharray:8 10}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#116b55"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a96d2f"/>
    </marker>
  </defs>

  <rect class="bg" width="1800" height="1120"/>
  <path d="M0 96H1800M0 192H1800M0 288H1800M0 384H1800M0 480H1800M0 576H1800M0 672H1800M0 768H1800M0 864H1800M0 960H1800M150 0V1120M300 0V1120M450 0V1120M600 0V1120M750 0V1120M900 0V1120M1050 0V1120M1200 0V1120M1350 0V1120M1500 0V1120M1650 0V1120" stroke="#e7ebe7" stroke-width="1"/>

  <text x="70" y="88" class="title">AI-Native Company Brain</text>
  <text x="70" y="128" class="subtitle">Git for organizational knowledge, with governed tools, skills, plugins, cron jobs, and MCP-compatible agents.</text>

  <rect x="70" y="170" width="1660" height="92" rx="16" class="panel"/>
  <text x="100" y="208" class="label">GOVERNANCE LAYER</text>
  <text x="100" y="238" class="small">SSO / SCIM · RBAC + ABAC · CODEOWNERS-style reviewers · retention · exports · compliance</text>
  <circle cx="1640" cy="216" r="28" class="green"/>
  <text x="1629" y="224" class="white" style="font:800 26px Inter,Arial">✓</text>

  <rect x="70" y="310" width="230" height="510" rx="18" class="panel"/>
  <text x="96" y="352" class="label">PASSIVE INPUTS</text>
  <g transform="translate(98 388)">
    <rect width="160" height="48" rx="10" class="node"/><text x="18" y="31" class="nodeText">Slack</text>
    <rect y="60" width="160" height="48" rx="10" class="node"/><text x="18" y="91" class="nodeText">Email</text>
    <rect y="120" width="160" height="48" rx="10" class="node"/><text x="18" y="151" class="nodeText">Docs</text>
    <rect y="180" width="160" height="48" rx="10" class="node"/><text x="18" y="211" class="nodeText">Meetings</text>
    <rect y="240" width="160" height="48" rx="10" class="node"/><text x="18" y="271" class="nodeText">Tickets</text>
    <rect y="300" width="160" height="48" rx="10" class="node"/><text x="18" y="331" class="nodeText">CRM</text>
    <rect y="360" width="160" height="48" rx="10" class="node"/><text x="18" y="391" class="nodeText" style="font-size:20px">Code + agents</text>
  </g>

  <rect x="330" y="310" width="230" height="510" rx="18" class="panel"/>
  <text x="358" y="352" class="label">COMPOSIO</text>
  <g transform="translate(358 390)">
    <rect width="160" height="54" rx="12" fill="#e8f0f6" stroke="#315f86" stroke-width="2"/><text x="16" y="34" class="nodeText" style="font-size:18px">Auth configs</text>
    <rect y="74" width="160" height="54" rx="12" fill="#e8f0f6" stroke="#315f86" stroke-width="2"/><text x="16" y="108" class="nodeText" style="font-size:17px">Connected accts</text>
    <rect y="148" width="160" height="54" rx="12" fill="#e8f0f6" stroke="#315f86" stroke-width="2"/><text x="16" y="182" class="nodeText" style="font-size:18px">Toolkits</text>
    <rect y="222" width="160" height="54" rx="12" fill="#e8f0f6" stroke="#315f86" stroke-width="2"/><text x="16" y="256" class="nodeText" style="font-size:18px">Actions</text>
    <rect y="296" width="160" height="54" rx="12" fill="#e5f4ec" stroke="#116b55" stroke-width="2"/><text x="16" y="330" class="nodeText" style="font-size:17px">Tool execution</text>
  </g>
  <text x="358" y="772" class="small">Auth + tools.</text>

  <rect x="590" y="310" width="300" height="510" rx="18" class="dark"/>
  <text x="620" y="352" class="label" fill="#1b8a68">MEMORY COMPILER</text>
  <g transform="translate(624 390)">
